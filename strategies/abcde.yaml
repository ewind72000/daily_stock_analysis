# ABCDE 战法策略

name: abcde
display_name: ABCDE量价战法
description: 基于量价关系的技术分析策略，通过量比、换手率、PE等指标识别股票所处状态。
category: trend
core_rules: [1, 2, 3, 4, 5]
required_tools:
  - get_daily_history
  - get_stock_info

instructions: |
  # ABCDE 量价战法

  ## 五种股票状态

  ### A型【抄底启动型】— 可试仓

  **判断标准：**
  - 动态PE处于低位（行业平均以下）
  - 换手率 3%-5%
  - 股价刚站上5日均线

  **逻辑：** 低估值+温和放量+筹码换手初期，说明资金开始抄底，股价刚扭转趋势，风险小有补涨空间。

  **操作：** 可试仓，止损设在前低下方。

  ---

  ### B型【趋势延续型】— 可试仓

  **判断标准：**
  - 动态PE在行业平均±10%内
  - 量比 2-3
  - 换手率 5%-8%
  - 股价在5/10/20日均线上（多头排列）

  **逻辑：** 估值合理+持续放量+筹码充分换手，说明主力在稳步拉涨，没有急着出货，趋势能延续。

  **操作：** 可跟着吃波段，持有为主，跌破MA20止损。

  ---

  ### C型【放量不涨型】— 加关注等信号

  **判断标准：**
  - 量比 3-4
  - 换手率 8%-12%
  - 股价在5日均线附近震荡（涨跌幅不大）

  **逻辑：** 放量但不涨，说明多空分歧大（有人买有人卖），主力可能在洗盘也可能在出货。此时介入容易被套在震荡里，不如等股价突破后再买。

  **操作：** 观望，等待突破信号。

  ---

  ### D型【缩量上涨型】— 加关注等信号

  **判断标准：**
  - 量比 0.8-1
  - 换手率较低

  **逻辑：** 股价上涨但没有资金跟进，属于"无量上涨"。就像"没有光线聚焦"，很可能是主力自己拉涨吸引散户，后续容易因为没承接力而下跌，别追高。

  **操作：** 不追高，等缩量回调或放量下跌后观察。

  ---

  ### E型【高位出货型】— 避雷

  **判断标准：**
  - 动态PE > 行业平均50%+
  - 量比 > 5
  - 换手率 > 15%
  - 股价涨3%-5%（但分时图上"冲高回落"）

  **逻辑：** 高估值+天量+超高换手，说明主力在高位大量卖股票，就算股价还在涨，也是"诱多"。比如某只网红股连续涨后突然出现这组合，第二天大概率跌停。

  **操作：** 必须减仓/清仓，避雷为主。

  ---

  ## 指标计算方式

  ### 量比 (Volume Ratio)
  ```
  量比 = 当前成交量 / 过去5日平均成交量
  - 量比 > 3: 异常放量
  - 量比 2-3: 温和放量
  - 量比 1-2: 正常放量
  - 量比 0.8-1: 缩量
  - 量比 < 0.8: 极度缩量
  ```

  ### 换手率 (Turnover Rate)
  ```
  换手率 = 当日成交量 / 流通股本 × 100%
  - 换手率 > 15%: 极高换手，主力可能出货
  - 换手率 8%-15%: 高换手，需警惕
  - 换手率 5%-8%: 活跃换手，趋势延续
  - 换手率 3%-5%: 温和换手，可能启动
  - 换手率 < 3%: 低换手，观望为主
  ```

  ### 动态PE
  ```
  动态PE = 当前股价 / 年度预估每股收益
  - PE < 行业平均: 低估值
  - PE ≈ 行业平均±10%: 合理估值
  - PE > 行业平均50%+: 高估值，风险大
  ```

  ---

  ## 评分调整

  - A型 + 放量确认: sentiment_score +15
  - B型 + 多头排列: sentiment_score +12
  - B型 + 缩量: sentiment_score -8
  - C型 + 缩量: sentiment_score -5
  - D型 + 缩量: sentiment_score -10
  - E型出现: sentiment_score -20 (必须减仓)
  - E型 + 冲高回落: sentiment_score -25 (清仓信号)
