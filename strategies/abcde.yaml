# ABCDE 战法策略

name: abcde
display_name: ABCDE量价战法
description: 基于量价关系的技术分析策略，通过量比、换手率、PE等指标识别股票所处状态。
category: trend
core_rules: [1, 2, 3, 4, 5, 6, 7]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - get_stock_info

# 默认激活
default_active: true
default_router: false
default_priority: 50
market_regimes: [trending_up, volatile]

instructions: |
  # ABCDE 量价战法

  ## 五种股票状态

  ### A型【抄底启动型】— 可试仓

  **判断标准（必须同时满足）：**
  - 动态PE < 行业平均30%（即 PE < 行业平均 × 0.7）
  - 量比 1.5-2.5
  - 换手率 3%-5%
  - 股价刚站上5日均线（今日收盘价 > MA5，且昨日收盘价 ≤ MA5）

  **核心逻辑：** 低估值+温和放量+黄金换手初期，说明资金开始抄底，股价刚扭转趋势，风险小有补涨空间。

  **典型场景：** 比如之前超跌的消费股，突然出现这种组合，很可能反弹。

  **操作建议：** 可试仓，止损设在前低下方。

  ---

  ### B型【趋势延续型】— 可试仓

  **判断标准（必须同时满足）：**
  - 动态PE在行业平均±10%内（即 行业平均×0.9 < PE < 行业平均×1.1）
  - 量比 2-3
  - 换手率 5%-8%
  - 股价在5/10/20日均线上（多头排列：MA5 > MA10 > MA20）

  **核心逻辑：** 估值合理+持续放量+筹码充分换手，说明主力在稳步拉涨，没有急着出货，趋势能延续。

  **典型场景：** 近期热门的AI股，经常出现这种组合，可跟着吃波段。

  **操作建议：** 可跟着吃波段，持有为主，跌破MA20止损。

  ---

  ### C型【放量不涨型】— 加关注等信号

  **判断标准（必须同时满足）：**
  - 量比 3-4
  - 换手率 8%-12%
  - 股价在5日均线附近震荡（涨跌幅 < 1%，即 |收盘价 - MA5| / MA5 < 1%）

  **核心逻辑：** 虽然放量，但股价不涨，说明多空分歧大（有人买有人卖），主力可能在洗盘，也可能在出货。

  **典型场景：** 此时介入容易被"套在震荡里"，不如等股价突破后再买。

  **操作建议：** 观望，等待突破信号（放量突破MA5且涨幅 > 2%时跟进）。

  ---

  ### D型【缩量上涨型】— 加关注等信号

  **判断标准（必须同时满足）：**
  - 量比 0.8-1
  - 换手率 < 3%
  - 股价涨2%-3%（涨幅在2%-3%之间）

  **核心逻辑：** 股价上涨但没有资金跟进，属于"无量上涨"，很可能是主力自己拉涨吸引散户，后续容易因为没承接力而下跌。

  **操作建议：** 不追高，等缩量回调或放量下跌后观察。

  ---

  ### E型【高位出货型】— 避雷

  **判断标准（必须同时满足）：**
  - 动态PE > 行业平均50%（即 PE > 行业平均 × 1.5）
  - 量比 > 5
  - 换手率 > 15%
  - 股价涨3%-5%（涨幅在3%-5%之间，但分时图上"冲高回落"）

  **核心逻辑：** 高估值+天量+超高换手，说明主力在高位大量卖股票，就算股价还在涨，也是"诱多"。

  **典型场景：** 某只网红股连续涨后突然出现这组合，第二天大概率跌停。

  **操作建议：** 必须减仓/清仓，避雷为主。E型 + 冲高回落是清仓信号。

  ---

  ## 指标计算方式

  ### 量比 (Volume Ratio)
  - 量比 > 5: 异常放量（主力对倒可能性大）
  - 量比 3-5: 明显放量
  - 量比 2-3: 温和放量（健康放量）
  - 量比 1.5-2.5: 温和放量（启动期）
  - 量比 0.8-1: 缩量
  - 量比 < 0.8: 极度缩量

  ### 换手率 (Turnover Rate)
  - 换手率 > 15%: 极高换手，主力可能出货
  - 换手率 8%-15%: 高换手，需警惕
  - 换手率 5%-8%: 活跃换手，趋势延续
  - 换手率 3%-5%: 温和换手，可能启动
  - 换手率 < 3%: 低换手，观望为主

  ### 动态PE vs 行业平均
  - PE < 行业平均×0.7: 低估值（30%以上折价）
  - PE ≈ 行业平均×0.9~1.1: 合理估值
  - PE > 行业平均×1.5: 高估值（50%以上溢价），风险大

  ---

  ## 评分调整规则

  - A型出现: sentiment_score +15
  - A型 + 放量确认（量比>2）: sentiment_score +5 额外加分
  - B型出现: sentiment_score +12
  - B型 + 多头排列确认: sentiment_score +3 额外加分
  - B型 + 缩量（量比<1）: sentiment_score -8
  - C型出现: sentiment_score -5
  - C型 + 缩量: sentiment_score -5 额外扣分
  - D型出现: sentiment_score -10
  - D型 + 缩量加剧: sentiment_score -5 额外扣分
  - E型出现: sentiment_score -20（必须减仓）
  - E型 + 冲高回落（日内涨幅收窄）: sentiment_score -25（清仓信号）

  ---

  ## 输出要求

  在分析每只股票时，必须：
  1. 计算上述所有指标（量比、换手率、动态PE、股价与均线的位置关系）
  2. 对照ABCDE判断标准，确定股票当前状态
  3. 在报告的"战法分类"部分明确写出：ABCDE类型 + 判断理由 + 操作建议
  4. 根据评分调整规则，计算最终的 sentiment_score
